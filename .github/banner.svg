<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200">
  <style>
    @keyframes ring1 {
      0%, 100% { transform: scale(1); opacity: 0.5; }
      50% { transform: scale(1.15); opacity: 0; }
    }
    @keyframes ring2 {
      0%, 100% { transform: scale(1); opacity: 0.35; }
      50% { transform: scale(1.2); opacity: 0; }
    }
    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-2px); }
    }
    @keyframes wiggle {
      0%, 100% { transform: rotate(0deg); }
      25% { transform: rotate(-3deg); }
      75% { transform: rotate(3deg); }
    }
    @keyframes pulse-bar {
      0%, 100% { transform: scaleY(1); }
      50% { transform: scaleY(0.7); }
    }
    .ring1 { animation: ring1 4s ease-out infinite; transform-origin: center; }
    .ring2 { animation: ring2 5s ease-out infinite 0.5s; transform-origin: center; }
    .phone { animation: wiggle 4s ease-in-out infinite; transform-origin: center; }
    .bounce { animation: bounce 4s ease-in-out infinite; }
    .bar { transform-origin: center; }
    .bar1 { animation: pulse-bar 3s ease-in-out infinite 0.0s; }
    .bar2 { animation: pulse-bar 3s ease-in-out infinite 0.2s; }
    .bar3 { animation: pulse-bar 3s ease-in-out infinite 0.4s; }
    .bar4 { animation: pulse-bar 3s ease-in-out infinite 0.6s; }
    .bar5 { animation: pulse-bar 3s ease-in-out infinite 0.8s; }
    .bar6 { animation: pulse-bar 3s ease-in-out infinite 1.0s; }
    .bar7 { animation: pulse-bar 3s ease-in-out infinite 1.2s; }
    .bar8 { animation: pulse-bar 3s ease-in-out infinite 1.4s; }
    .bar9 { animation: pulse-bar 3s ease-in-out infinite 1.6s; }
  </style>

  <!-- Background -->
  <rect width="800" height="200" rx="20" fill="#FFF5E6"/>

  <!-- Dotted decoration -->
  <circle cx="40" cy="30" r="6" fill="#FFD166" opacity="0.5"/>
  <circle cx="760" cy="170" r="8" fill="#FF6B8A" opacity="0.4"/>
  <circle cx="720" cy="40" r="5" fill="#7ED6DF" opacity="0.5"/>
  <circle cx="80" cy="170" r="7" fill="#A8E6CF" opacity="0.5"/>
  <circle cx="400" cy="20" r="4" fill="#FFD166" opacity="0.4"/>
  <circle cx="600" cy="180" r="5" fill="#C3AED6" opacity="0.5"/>

  <!-- Left sound bars -->
  <g transform="translate(100, 100)" fill="#FF6B8A" stroke="none">
    <rect class="bar bar1" x="0"  y="-15" width="8" height="30" rx="4"/>
    <rect class="bar bar2" x="14" y="-25" width="8" height="50" rx="4"/>
    <rect class="bar bar3" x="28" y="-35" width="8" height="70" rx="4"/>
    <rect class="bar bar4" x="42" y="-45" width="8" height="90" rx="4"/>
    <rect class="bar bar5" x="56" y="-35" width="8" height="70" rx="4"/>
    <rect class="bar bar6" x="70" y="-25" width="8" height="50" rx="4"/>
    <rect class="bar bar7" x="84" y="-15" width="8" height="30" rx="4"/>
  </g>

  <!-- Cartoon phone with ringing animation -->
  <g transform="translate(230, 100)">
    <!-- Ring waves -->
    <circle class="ring1" cx="0" cy="0" r="35" fill="none" stroke="#7ED6DF" stroke-width="3"/>
    <circle class="ring2" cx="0" cy="0" r="35" fill="none" stroke="#FFD166" stroke-width="2"/>

    <!-- Phone body -->
    <g class="phone">
      <rect x="-18" y="-30" width="36" height="60" rx="8" fill="#7ED6DF" stroke="#5AB8C7" stroke-width="2.5"/>
      <!-- Screen -->
      <rect x="-12" y="-22" width="24" height="32" rx="3" fill="#E0F7FA"/>
      <!-- Happy face on screen -->
      <circle cx="-4" cy="-10" r="2.5" fill="#5AB8C7"/>
      <circle cx="4" cy="-10" r="2.5" fill="#5AB8C7"/>
      <path d="M-5,-3 Q0,4 5,-3" fill="none" stroke="#5AB8C7" stroke-width="2" stroke-linecap="round"/>
      <!-- Home button -->
      <circle cx="0" cy="20" r="5" fill="#E0F7FA" stroke="#5AB8C7" stroke-width="1.5"/>
    </g>
  </g>

  <!-- Title -->
  <g class="bounce">
    <text x="290" y="88" font-family="'Comic Sans MS', 'Chalkboard SE', 'Marker Felt', cursive" font-size="56" font-weight="700" fill="#FF6B8A" stroke="#E8527A" stroke-width="1">switest</text>
  </g>

  <!-- Subtitle -->
  <text x="294" y="118" font-family="'Comic Sans MS', 'Chalkboard SE', cursive" font-size="15" fill="#888" letter-spacing="1">Functional testing for voice apps</text>

  <!-- Pill badges -->
  <g transform="translate(294, 135)">
    <rect x="0" y="0" width="90" height="24" rx="12" fill="#FFD166"/>
    <text x="45" y="16" font-family="'Comic Sans MS', cursive" font-size="11" font-weight="600" fill="#8B6914" text-anchor="middle">FreeSWITCH</text>

    <rect x="100" y="0" width="72" height="24" rx="12" fill="#A8E6CF"/>
    <text x="136" y="16" font-family="'Comic Sans MS', cursive" font-size="11" font-weight="600" fill="#2D6A4F" text-anchor="middle">Minitest</text>

    <rect x="182" y="0" width="68" height="24" rx="12" fill="#C3AED6"/>
    <text x="216" y="16" font-family="'Comic Sans MS', cursive" font-size="11" font-weight="600" fill="#5B3A7A" text-anchor="middle">librevox</text>
  </g>

  <!-- Right sound bars -->
  <g transform="translate(610, 100)" fill="#FFD166" stroke="none">
    <rect class="bar bar5" x="0"  y="-12" width="8" height="24" rx="4"/>
    <rect class="bar bar6" x="14" y="-22" width="8" height="44" rx="4"/>
    <rect class="bar bar7" x="28" y="-16" width="8" height="32" rx="4"/>
    <rect class="bar bar8" x="42" y="-35" width="8" height="70" rx="4"/>
    <rect class="bar bar9" x="56" y="-22" width="8" height="44" rx="4"/>
    <rect class="bar bar1" x="70" y="-40" width="8" height="80" rx="4"/>
    <rect class="bar bar2" x="84" y="-28" width="8" height="56" rx="4"/>
    <rect class="bar bar3" x="98" y="-16" width="8" height="32" rx="4"/>
    <rect class="bar bar4" x="112" y="-32" width="8" height="64" rx="4"/>
    <rect class="bar bar5" x="126" y="-18" width="8" height="36" rx="4"/>
    <rect class="bar bar6" x="140" y="-10" width="8" height="20" rx="4"/>
  </g>
</svg>
